<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Estudiante</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Registro de Estudiante</h2>

        <form id="studentForm">

            <div class="mb-3">
                <label class="form-label">Correo institucional</label>
                <input type="email" class="form-control" id="email" placeholder="ejemplo@itoaxaca.edu.mx" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Semestre (1 - 4)</label>
                <input type="number" class="form-control" id="semester" min="1" max="4" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Condición</label>
                <select class="form-select" id="origin" required>
                    <option value="">Selecciona</option>
                    <option value="Local">Local</option>
                    <option value="Foráneo">Foráneo</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Horas de sueño (0 - 20)</label>
                <input type="number" class="form-control" id="sleepHours" min="0" max="20" required>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="privacy" required>
                <label class="form-check-label">
                    Acepto el <a href="#" data-bs-toggle="modal" data-bs-target="#privacyModal">aviso de privacidad</a>
                </label>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Registrar
            </button>

        </form>

        <div id="message" class="mt-3"></div>

        <a href="index.html" class="btn btn-secondary mt-3">Volver</a>

    </div>
</div>

<!-- Modal privacidad -->
<div class="modal fade" id="privacyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Aviso de Privacidad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p>
                    Este sistema recopila información académica y hábitos de sueño con fines
                    de análisis del estrés estudiantil. Los datos serán tratados de forma
                    confidencial y utilizados únicamente con fines educativos.
                </p>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
