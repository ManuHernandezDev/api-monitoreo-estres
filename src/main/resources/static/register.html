<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ATENEA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-4">ATENEA</h3>
    <p class="text-muted text-center text-sm">Registro de Perfil Psicosocial</p>

    <form id="registerForm">
        <div class="mb-3">
            <label for="edad" class="form-label">Edad</label>
            <input type="number" class="form-control" id="edad" required min="17" max="30">
        </div>

        <div class="mb-3">
            <label for="semestre" class="form-label">Semestre actual (Solo 1° a 4°)</label>
            <select class="form-select" id="semestre" required>
                <option value="" selected disabled>Selecciona tu semestre</option>
                <option value="1">1° Semestre</option>
                <option value="2">2° Semestre</option>
                <option value="3">3° Semestre</option>
                <option value="4">4° Semestre</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="residencia" class="form-label">Estatus de residencia</label>
            <select class="form-select" id="residencia" required>
                <option value="" selected disabled>¿Eres local o foráneo?</option>
                <option value="LOCAL">Local</option>
                <option value="FORANEO">Foráneo</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="sueno" class="form-label">Horas promedio de sueño al día</label>
            <input type="number" class="form-control" id="sueno" required min="0" max="14">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="privacidad" required>
            <label class="form-check-label" style="font-size: 0.85rem;" for="privacidad">
                Acepto el Aviso de Privacidad y el tratamiento de mis datos psicosociales.
            </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Crear Perfil</button>
    </form>
    <div id="alertMessage" class="mt-3"></div>
</div>

<script src="app.js"></script>
</body>
</html>
